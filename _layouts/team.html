---
layout: default
---

<style>
    .bio-content {
        text-align: justify;
    }
    .bio-content a{
       color: #49a942;
       text-underline-offset: 0.25rem; 
    }
    .bio-content a:hover{
        text-decoration: underline;
        text-underline-offset: 0.25rem; 
    }
    .square-grid {
        background-size: 40px 40px;
        background-image: 
            linear-gradient(to right, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(15, 23, 42, 0.05) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 50%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent);
    }
</style>
<section class="py-24 bg-slate-50 relative overflow-hidden min-h-screen">
    <!-- Grid Layer -->
    <div class="absolute inset-0 square-grid opacity-60"></div>
    
    <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-160 h-160 bg-brand/5 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/2 w-160 h-160 bg-brand/5 blur-[120px] rounded-full"></div>


<div class="mx-auto max-w-7xl px-6 lg:px-8 relative z-10">
<div class="text-center mb-16">
<h2 class="text-base font-black leading-7 text-brand uppercase tracking-[0.3em] mb-4">Leadership</h2>
<h1 class="text-5xl font-extrabold tracking-tight text-slate-900 sm:text-7xl font-display uppercase leading-tight">
Management <span class="text-brand">Team</span>
</h1>
</div>

<!-- All Team Members -->
<div class="space-y-10">
{% for member in site.team %}
<div class="bg-white rounded-[3rem] p-8 lg:p-12 shadow-2xl shadow-slate-200/60 border border-slate-100 flex flex-col lg:flex-row gap-8 lg:gap-12 items-center lg:items-start">

<!-- Avatar Side (15%) -->
<div class="w-[200px] shrink-0 mx-auto lg:mx-0">
<div class="relative group">
<div class="absolute -inset-2 bg-brand/10 blur-xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
<div class="relative  overflow-hidden rounded-3xl border-4 border-slate-50 shadow-md">
<img src="{{ member.image | relative_url }}" 
alt="{{ member.name }}" 
class="w-[200px] h-[200px] object-cover object-[center_20%] transition-all duration-1000 scale-105 group-hover:scale-100">
</div>
</div>
</div>

<!-- Content Side (85%) -->
<div class="flex-1 lg:pl-4 text-center lg:text-left">
<div class="mb-8">
<span class="inline-block bg-brand/10 text-brand text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest border border-brand/20 mb-4">{{ member.role }}</span>
<h3 class="text-4xl lg:text-5xl font-black text-slate-900 uppercase tracking-tight mb-2">{{ member.name }}</h3>
<div class="h-1.5 w-24 bg-brand rounded-full mx-auto lg:ml-0"></div>
</div>

<div class="text-slate-600 font-medium leading-relaxed space-y-6 prose-slate bio-content">
{{ member.content }}
</div>
</div>
</div>
{% endfor %}
</div>
</div>
</section>
