---
layout: default
---

<style>
    .bio-content {
        text-align: justify;
    }
    .bio-content a{
       color: #49a942;
       text-underline-offset: 0.25rem; 
    }
    .bio-content a:hover{
        text-decoration: underline;
        text-underline-offset: 0.25rem; 
    }
    .square-grid {
        background-size: 40px 40px;
        background-image: 
            linear-gradient(to right, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(15, 23, 42, 0.05) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 50%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent);
    }
</style>
<section class="py-24 bg-slate-50 relative overflow-hidden min-h-screen">
    <!-- Grid Layer -->
    <div class="absolute inset-0 square-grid opacity-60"></div>
    
    <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-160 h-160 bg-brand/5 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/2 w-160 h-160 bg-brand/5 blur-[120px] rounded-full"></div>


<div class="mx-auto max-w-7xl px-6 lg:px-8 relative z-10" x-data="{ activeTab: '{{ site.team.first.slug }}' }">
<div class="text-center mb-16">
<h2 class="text-base font-black leading-7 text-brand uppercase tracking-[0.3em] mb-4">Leadership</h2>
<h1 class="text-5xl font-extrabold tracking-tight text-slate-900 sm:text-7xl font-display uppercase leading-tight">
Management <span class="text-brand">Team</span>
</h1>
</div>

<!-- Tab Switcher -->
<div class="flex flex-wrap justify-center gap-4 mb-12">
{% for member in site.team %}
<button 
type="button"
@click="activeTab = '{{ member.slug }}'" 
:class="activeTab === '{{ member.slug }}' ? 'bg-slate-900 text-white shadow-xl shadow-slate-900/20' : 'bg-white text-slate-600 hover:bg-slate-100'"
class="px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all duration-300 flex items-center gap-3 border border-slate-200/60 cursor-pointer">
<span :class="activeTab === '{{ member.slug }}' ? 'bg-brand' : 'bg-slate-200'" class="w-2 h-2 rounded-full transition-colors"></span>
{{ member.name }}
</button>
{% endfor %}
</div>

<!-- Tab Content Container -->
<div class="relative">
{% for member in site.team %}
<!-- {{ member.name }} tab -->
<div x-show="activeTab === '{{ member.slug }}'" 
x-transition:enter="transition ease-out duration-500"
x-transition:enter-start="opacity-0 translate-y-8"
x-transition:enter-end="opacity-100 translate-y-0"
class="bg-white rounded-[3rem] p-8 lg:p-12 shadow-2xl shadow-slate-200/60 border border-slate-100 flex flex-col lg:flex-row gap-8 lg:gap-12 items-start"
x-cloak>

<!-- Avatar Side (15%) -->
<div class="w-full lg:w-[15%] shrink-0">
<div class="relative group">
<div class="absolute -inset-2 bg-brand/10 blur-xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
<div class="relative aspect-square overflow-hidden rounded-3xl border-4 border-slate-50 shadow-md">
<img src="{{ member.image | relative_url }}" 
alt="{{ member.name }}" 
class="w-full h-full object-cover transition-all duration-1000 scale-105 group-hover:scale-100">
</div>
</div>
</div>

<!-- Content Side (85%) -->
<div class="flex-1 lg:pl-4">
<div class="mb-8">
<span class="inline-block bg-brand/10 text-brand text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest border border-brand/20 mb-4">{{ member.role }}</span>
<h3 class="text-4xl lg:text-5xl font-black text-slate-900 uppercase tracking-tight mb-2">{{ member.name }}</h3>
<div class="h-1.5 w-24 bg-brand rounded-full"></div>
</div>

<div class="text-slate-600 font-medium leading-relaxed space-y-6 prose-slate bio-content">
{{ member.content }}
</div>
</div>
</div>
{% endfor %}
</div>
</div>
</section>
