{% assign trusted = site.data.why_trusted %}
<section class="py-16 relative bg-transparent overflow-hidden">
    <!-- Square Grid Background -->
    <div class="absolute inset-0 bg-square-grid pointer-events-none"></div>
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="grid grid-cols-1 gap-y-16 lg:grid-cols-2 lg:items-center lg:gap-x-24">
            <div class="order-2 lg:order-1">
                <div class="inline-flex items-center gap-3 px-0 mb-12">
                    <div class="h-px w-8 bg-brand"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-brand">{{ trusted.badge }}</span>
                </div>
                <h2 class="text-5xl font-extrabold tracking-tight text-slate-900 sm:text-7xl font-display uppercase leading-[0.9] mb-12">
                    {{ trusted.title }}
                </h2>
                <p class="mt-8 text-xl leading-relaxed text-slate-600 max-w-xl font-medium">
                    {{ trusted.description }}
                </p>
                
                <div class="mt-12 space-y-4" x-data="{ active: 0 }">
                    {% for feature in trusted.features %}
                    {% assign index = forloop.index0 %}
                    <div class="relative group transition-all duration-300 rounded-3xl border border-slate-100 overflow-hidden"
                         :class="active === {{ index }} ? 'bg-slate-50/50 border-brand/30 shadow-2xl shadow-brand/5' : 'bg-white hover:bg-slate-50 hover:border-slate-200'">
                        
                        <button @click="active === {{ index }} ? active = null : active = {{ index }}" 
                                class="flex items-center gap-5 p-6 w-full text-left transition-all duration-300 focus:outline-none">
                            <div class="h-10 w-10 rounded-xl flex items-center justify-center shrink-0 transition-all duration-500 border border-brand/20"
                                 :class="active === {{ index }} ? 'bg-brand text-white shadow-lg shadow-brand/20' : 'bg-brand/10 text-brand'">
                                <svg class="h-5.5 w-5.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" /></svg>
                            </div>
                            <div class="flex-1">
                                <h4 class="text-lg font-bold transition-colors duration-300 tracking-tight"
                                    :class="active === {{ index }} ? 'text-brand' : 'text-slate-900'">{{ feature.title }}</h4>
                            </div>
                            <!-- Chevron -->
                            <svg class="h-5 w-5 text-slate-400 transition-transform duration-300" 
                                 :class="active === {{ index }} ? 'rotate-180 text-brand' : ''"
                                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>

                        <div x-show="active === {{ index }}" 
                             x-cloak
                             x-collapse
                             x-transition:enter="transition ease-out duration-300"
                             x-transition:enter-start="opacity-0 transform -translate-y-2"
                             x-transition:enter-end="opacity-100 transform translate-y-0"
                             class="px-6 pb-6 pl-21">
                            <p class="text-slate-500 text-[15px] leading-relaxed font-medium">
                                {{ feature.description }}
                            </p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="order-1 lg:order-2">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-linear-to-r from-brand to-brand-light opacity-30 blur-2xl group-hover:opacity-40 transition duration-1000"></div>
                    <div class="relative aspect-square overflow-hidden rounded-4xl border border-white bg-slate-100 shadow-2xl">
                        <img src="{{ trusted.image | replace: ' ', '%20' | relative_url }}" alt="{{ trusted.image_alt }}" class="h-full w-full object-cover transition-transform duration-1000 group-hover:scale-105">
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-20">
            {% include testimonials-section.html %}
        </div>
    </div>
</section>
