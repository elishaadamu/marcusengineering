{% assign trusted = site.data.why_trusted %}
<section class="py-16 relative bg-transparent">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="grid grid-cols-1 gap-y-16 lg:grid-cols-2 lg:items-center lg:gap-x-24">
            <div class="order-2 lg:order-1">
                <div class="inline-flex items-center gap-3 px-0 mb-12">
                    <div class="h-px w-8 bg-brand"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-brand">{{ trusted.badge }}</span>
                </div>
                <h2 class="text-5xl font-extrabold tracking-tight text-slate-900 sm:text-7xl font-display uppercase leading-[0.9] mb-12">
                    {{ trusted.title }}
                </h2>
                <p class="mt-8 text-xl leading-relaxed text-slate-600 max-w-xl font-medium">
                    {{ trusted.description }}
                </p>
                
                <div class="mt-12 space-y-6">
                    {% for feature in trusted.features %}
                    <div class="flex items-start gap-5 p-6 rounded-2xl hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-colors">
                        <div class="mt-1 h-8 w-8 rounded-lg bg-brand/10 flex items-center justify-center shrink-0">
                            <svg class="h-5 w-5 text-brand" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" /></svg>
                        </div>
                        <div>
                            <h4 class="text-lg font-bold text-slate-900 tracking-tight">{{ feature.title }}</h4>
                            <p class="text-slate-500 mt-1">{{ feature.description }}</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="order-1 lg:order-2">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-linear-to-r from-brand to-brand-light opacity-30 blur-2xl group-hover:opacity-40 transition duration-1000"></div>
                    <div class="relative aspect-square overflow-hidden rounded-4xl border border-white bg-slate-100 shadow-2xl">
                        <img src="{{ trusted.image | replace: ' ', '%20' | relative_url }}" alt="{{ trusted.image_alt }}" class="h-full w-full object-cover transition-transform duration-1000 group-hover:scale-105">
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
