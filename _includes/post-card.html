{% assign post = include.post %}
<div class="group relative flex flex-col bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-xl shadow-slate-200/50 hover:shadow-2xl hover:-translate-y-2 hover:border-brand/40 transition-all duration-500 h-full cursor-pointer" onclick="window.location.href='{{ post.url | relative_url }}'">
    {% assign card_image = post.thumbnail | default: post.image %}
    {% if card_image and card_image != "" %}
    <div class="aspect-video relative overflow-hidden bg-slate-50">
        <img src="{{ card_image | relative_url }}" alt="{{ post.title }}" class="w-full h-full object-contain transition-transform duration-1000 group-hover:scale-105">
    </div>
    {% else %}
    <div class="aspect-video relative overflow-hidden bg-slate-100 flex items-center justify-center p-6">
        <svg class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
    </div>
    {% endif %}

    <div class="p-8 flex flex-col flex-1">
        <div class="flex items-center gap-2 mb-4">
            <span class="h-px w-8 bg-brand"></span>
            <time datetime="{{ post.date | date_to_xmlschema }}" class="text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">
                {{ post.date | date: "%B %d, %Y" }}
            </time>
        </div>

        <h3 class="text-xl font-black text-slate-900 tracking-tight uppercase font-display leading-tight mb-4 group-hover:text-brand transition-colors">
            <a href="{{ post.url | relative_url }}" class="hover:text-brand">
                {{ post.title | escape }}
            </a>
        </h3>

        <p class="text-sm leading-6 text-slate-500 line-clamp-3 mb-6 font-medium">
            {{ post.excerpt | strip_html | truncate: 150 }}
        </p>

        <div class="mt-auto pt-6 border-t border-slate-50 h-10 flex items-center">
            <div class="text-[10px] font-black text-brand uppercase tracking-widest flex items-center gap-2 group-hover:gap-3 transition-all">
                Read Insights 
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            </div>
        </div>
    </div>
</div>
