{% assign hero = site.data.hero %}
<section class="relative h-screen -mt-20 mb-20 flex items-center overflow-hidden z-10">
    <!-- Video Background -->
    <div class="absolute inset-0 w-full h-full overflow-hidden z-0">
        <video autoplay muted loop playsinline poster="{{ hero.video_poster | relative_url }}" class="absolute inset-0 w-full h-full object-cover">
            <source src="{{ hero.video_webm | relative_url }}" type="video/webm">
            <source src="{{ hero.video_mp4 | relative_url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/10"></div>
    </div>
    <style>
        .pantone-text { color: #48A23F !important; }
        .pantone-bg { background-color: #48A23F !important; }
        .pantone-border-40 { border-color: rgba(72, 162, 63, 0.4) !important; }
        .hover-pantone-bg:hover { background-color: #48A23F !important; }
        .hover-pantone-text:hover { color: #48A23F !important; }
    </style>

    <div class="mx-auto max-w-7xl px-6 lg:px-8 mb-20 w-full flex flex-col items-start justify-center relative z-10 pt-20">
        <!-- Glass Container -->
        <div class="relative max-w-4xl p-10 lg:p-16 border border-white/80 bg-white/10 backdrop-blur-sm rounded-3xl shadow-[0_0_60px_-15px_rgba(73,169,66,0.3)]">
            <!-- Glowing Badge -->
            <div style="border-color: rgba(72, 162, 63, 0.4) !important;" class="inline-flex items-center gap-3 px-4 py-2 rounded-full border bg-white/10 text-white text-[10px] font-bold uppercase tracking-[0.2em] mb-8 shadow-sm">
                <span class="relative flex h-2 w-2">
                  <span style="background-color: #48A23F !important;" class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
                  <span style="background-color: #48A23F !important;" class="relative inline-flex rounded-full h-2 w-2"></span>
                </span>
                {{ hero.badge }}
            </div>
            
            <h1 class="text-5xl font-extrabold tracking-tighter text-white sm:text-7xl font-display uppercase leading-[0.9]">
                {{ hero.title }}
            </h1>
            <p class="mt-8 text-xl leading-8 text-white max-w-2xl font-medium tracking-tight">
                {{ hero.description }}
                <span class="text-white font-bold block mt-2">{{ hero.description_bold }}</span>
            </p>
            <div class="mt-12 flex flex-col sm:flex-row items-center justify-start gap-8">
                <a href="{{ hero.primary_button_link | relative_url }}" style="background-color: #000000 !important;" class="rounded-full px-12 py-4 text-xs font-black text-white shadow-xl shadow-black/20 hover-pantone-bg transition-all uppercase tracking-[0.2em] transform hover:-translate-y-1">{{ hero.primary_button_text }}</a>
                <a href="{{ hero.secondary_button_link | relative_url }}" class="text-xs font-bold leading-6 text-white hover-pantone-text transition-colors uppercase tracking-[0.2em] flex items-center gap-2 group">
                    {{ hero.secondary_button_text }} 
                    <svg class="h-4 w-4 transition-transform group-hover:translate-x-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z" clip-rule="evenodd" /></svg>
                </a>
            </div>
        </div>
    </div>
</section>
