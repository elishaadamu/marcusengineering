{% assign hero = site.data.hero %}
<section class="hero-section">
    <!-- Video Background with Multi-Video Rotation -->
    <div class="hero-video-bg bg-slate-900" x-data="heroVideos()" x-init="init()">
        {% for video in hero.videos %}
        <video 
            x-ref="video{{ forloop.index0 }}"
            {% if forloop.first %}autoplay{% endif %}
            muted 
            playsinline 
            loop
            preload="auto"
            class="absolute inset-0 w-full h-full object-cover transition-opacity duration-2000"
            :class="currentVideo === {{ forloop.index0 }} ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'"
            :style="currentVideo === {{ forloop.index0 }} ? 'visibility: visible' : 'visibility: hidden'"
        >
            <source src="{{ video.src | relative_url }}" type="{{ video.type }}">
        </video>
        {% endfor %}
    </div>
    
    <!-- Gradient Overlay -->
    <div class="hero-overlay"></div>

    <!-- Hero Content -->
    <div class="hero-container">
        <div class="hero-content-container">
            <div class="hero-content">
            <!-- Badge -->
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span class="badge-text">{{ hero.badge }}</span>
            </div>
            
            <!-- Main Heading with Writing Animation -->
            <h1 class="hero-title" 
                x-data="typingEffect()"
                x-init="init()">
                
                <span class="block min-h-[1.12em]">
                    <span x-text="display1"></span>
                    <span x-show="activeLine === 1" class="inline-block w-1 h-[0.8em] bg-brand ml-1 animate-cursor-blink"></span>
                </span>
                <span class="block relative py-1 min-h-[1.12em]" :class="display2.length > 0 ? '' : 'opacity-0'">
                    <span class="highlight-marker text-white relative z-10" x-text="display2"></span>
                    <span x-show="activeLine === 2" class="inline-block w-1 h-[0.8em] bg-brand ml-1 animate-cursor-blink"></span>
                </span>
                <span class="block relative min-h-[1.12em]">
                    <span x-text="display3"></span>
                    <span x-show="activeLine === 3" class="inline-block w-1 h-[0.8em] bg-brand ml-1 animate-cursor-blink"></span>
                </span>
            </h1>
            
            <!-- Description -->
            <div class="hero-description">
                <p class="hero-text">{{ hero.description }}</p>
                <p class="hero-highlight">{{ hero.description_bold }}</p>
            </div>
            
            <!-- Call-to-Action Buttons -->
            <div class="hero-actions">
                <a href="{{ hero.primary_button_link | relative_url }}" class="btn btn-primary">
                    {{ hero.primary_button_text }}
                </a>
                <a href="{{ hero.secondary_button_link | relative_url }}" class="btn btn-secondary">
                    {{ hero.secondary_button_text }}
                    <svg class="btn-icon" width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </div>
            </div>
        </div>
    </div>
</section>

<script>
function typingEffect() {
    return {
        text1: 'ELECTRONICS',
        text2: 'DESIGNS',
        text3: 'INTEGRATIONS',
        display1: '',
        display2: '',
        display3: '',
        activeLine: 1,
        
        init() {
            setTimeout(() => this.type(), 1500);
        },
        
        async type() {
            // Type Line 1
            this.activeLine = 1;
            for (let i = 0; i <= this.text1.length; i++) {
                this.display1 = this.text1.substring(0, i);
                await new Promise(r => setTimeout(r, 120));
            }
            await new Promise(r => setTimeout(r, 800));
            
            // Type Line 2
            this.activeLine = 2;
            for (let i = 0; i <= this.text2.length; i++) {
                this.display2 = this.text2.substring(0, i);
                await new Promise(r => setTimeout(r, 140));
            }
            await new Promise(r => setTimeout(r, 1000));

            // Type Line 3
            this.activeLine = 3;
            for (let i = 0; i <= this.text3.length; i++) {
                this.display3 = this.text3.substring(0, i);
                await new Promise(r => setTimeout(r, 160));
            }
        }
    };
}

function heroVideos() {
    return {
        currentVideo: 0,
        totalVideos: parseInt('{{ hero.videos | size | default: 0 }}'),
        interval: null,
        
        init() {
            // Start playing the first video
            const firstVid = this.$refs.video0;
            if (firstVid) {
                firstVid.play().catch(e => {});
            }
            
            // Rotate videos every 8 seconds
            this.interval = setInterval(() => {
                this.nextVideo();
            }, 8000);
            
            // Handle visibility changes
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const vid = this.$refs['video' + this.currentVideo];
                        if (vid && vid.paused) {
                            vid.play().catch(e => {});
                        }
                    }
                });
            }, { threshold: 0.1 });
            
            observer.observe(this.$el);
            
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    const vid = this.$refs['video' + this.currentVideo];
                    if (vid && vid.paused) {
                        vid.play().catch(e => {});
                    }
                }
            });
        },
        
        nextVideo() {
            const oldVid = this.$refs['video' + this.currentVideo];
            this.currentVideo = (this.currentVideo + 1) % this.totalVideos;
            
            const newVid = this.$refs['video' + this.currentVideo];
            if (newVid) {
                newVid.currentTime = 0;
                newVid.play().catch(e => {});
            }
            
            setTimeout(() => {
                if (oldVid) {
                    oldVid.pause();
                }
            }, 2500);
        }
    };
}
</script>
